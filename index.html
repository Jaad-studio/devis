<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur de Devis | JAAD Studio</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- html2pdf.js pour la génération de vrais PDF -->

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');

        body { 
            font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif; 
        }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 4px; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
        
        .animate-in.fade-in { animation: fadeIn 0.7s ease-out forwards; }
        .animate-in.zoom-in-95 { animation: zoomIn 0.7s ease-out forwards; }
        
        .card-shadow {
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.04), 0 4px 10px -2px rgba(0, 0, 0, 0.02);
        }
        
        .card-shadow-active {
            box-shadow: 0 20px 40px -10px rgba(59, 102, 245, 0.15);
        }

        .gradient-border {
            position: relative;
            background: #fff;
        }

        .selected-ring {
            box-shadow: 0 0 0 2px #3B66F5;

    </style>
</head>
<body class="bg-[#F9FBFF]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const JAAD_BLUE = "#3B66F5";

        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                Check: '<polyline points="20 6 9 17 4 12" />',
                ChevronRight: '<polyline points="9 18 15 12 9 6" />',
                ChevronLeft: '<polyline points="15 18 9 12 15 6" />',
                Rocket: '<path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z" /><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z" /><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0" /><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5" />',
                Sparkles: '<path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" /><path d="M5 3v4" /><path d="M19 17v4" /><path d="M3 5h4" /><path d="M17 19h4" />',
                Box: '<path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z" /><path d="m3.3 7 8.7 5 8.7-5" /><path d="M12 22V12" />',
                LayoutPanelTop: '<rect width="18" height="7" x="3" y="3" rx="1" /><rect width="7" height="7" x="3" y="14" rx="1" /><rect width="7" height="7" x="14" y="14" rx="1" />',
                GraduationCap: '<path d="M21.42 10.922a2 2 0 0 1-.006 2.853l-8.5 8.5a2 2 0 0 1-2.828 0l-8.5-8.5a2 2 0 0 1-.006-2.853L10.58 1.928a2 2 0 0 1 2.84 0l9 9.006z" /><path d="M22 10v6" /><path d="M6 12.5V16a6 3 0 0 0 12 0v-3.5" />',
                Cpu: '<rect width="16" height="16" x="4" y="4" rx="2" /><rect width="6" height="6" x="9" y="9" rx="1" /><path d="M15 2v2" /><path d="M15 20v2" /><path d="M2 15h2" /><path d="M2 9h2" /><path d="M20 15h2" /><path d="M20 9h2" /><path d="M9 2v2" /><path d="M9 20v2" />',

                Building2: '<path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z" /><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2" /><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2" /><path d="M10 6h4" /><path d="M10 10h4" /><path d="M10 14h4" /><path d="M10 18h4" />',
                Mail: '<rect width="20" height="16" x="2" y="4" rx="2" /><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />',
                AlertCircle: '<circle cx="12" cy="12" r="10" /><line x1="12" x2="12" y1="8" y2="12" /><line x1="12" x2="12.01" y1="16" y2="16" />',
                FileText: '<path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" /><polyline points="14 2 14 8 20 8" /><line x1="16" x2="8" y1="13" y2="13" /><line x1="16" x2="8" y1="17" y2="17" /><line x1="10" x2="8" y1="9" y2="9" />',
                Download: '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" x2="12" y1="15" y2="3" />',
                Send: '<path d="m22 2-7 20-4-9-9-4Z" /><path d="M22 2 11 13" />',
                Loader2: '<path d="M21 12a9 9 0 1 1-6.219-8.56" />',
                XCircle: '<circle cx="12" cy="12" r="10" /><path d="m15 9-6 6" /><path d="m9 9 6 6" />',
                RotateCcw: '<path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" /><path d="M3 3v5h5" />'
            };

            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{ __html: icons[name] }} />
            );
        };

        const STEPS = [
            {
                id: 'contact',
                title: 'Générer votre devis',
                label: 'Contact',
                description: 'Veuillez indiquer vos coordonnées pour commencer la création de votre devis sur-mesure.',
                isContactStep: true
            },
            {
                id: 'base',
                title: 'Bâtissez votre architecture',
                label: 'Architecture',
                description: 'Sélectionnez le socle de votre projet numérique. Design immersif et UX sur-mesure inclus.',
                options: [
                    { id: 'vitrine-one', label: 'Vitrine Impact', price: 700, icon: <Icon name="Rocket" size={24} />, info: 'Jusqu\'à 5 pages incluses. Design fluide conçu pour la conversion.', features: ['Design 100% immersif', 'Optimisé SEO local', 'Idéal lancement'], impact: 20 },
                    { id: 'vitrine-multi', label: 'Vitrine Premium', price: 1000, icon: <Icon name="Sparkles" size={24} />, info: 'Plus de 5 pages. Architecture multi-pages avec univers graphique riche.', features: ['Architecture avancée', 'Parcours UX complexe', 'Format PME/ETI'], impact: 35 },
                    { id: 'ecommerce-basic', label: 'E-commerce Basic', price: 1500, icon: <Icon name="Box" size={24} />, info: 'Boutique essentielle. Lancer vos ventes rapidement et simplement.', features: ['Gestion autonome', 'Paiement Stripe/PP', 'Fiches produits optimisées'], impact: 45 },
                    { id: 'ecommerce', label: 'E-commerce Premium', price: 2500, icon: <Icon name="Box" size={24} />, info: 'Boutique haute performance. Expérience d’achat fluide et sécurisée.', features: ['Filtres à facettes', 'Automatisations stock', 'Vitesse éclair'], impact: 55 },
                    { id: 'application', label: 'Application Web / SaaS', price: 0, customPrice: 'Sur demande', disabled: true, icon: <Icon name="LayoutPanelTop" size={24} />, info: 'Plateforme métier complexe ou dashboard sur-mesure.', features: ['Dashboard admin', 'Backend temps réel', 'Hautement scalable'], impact: 65 },
                    { id: 'elearning', label: 'Espace E-learning', price: 0, customPrice: 'Sur demande', disabled: true, icon: <Icon name="GraduationCap" size={24} />, info: 'Plateforme de formation interactive. Étude approfondie requise.', features: ['Quizz & Certificats', 'Vente de formations', 'Suivi élèves'], impact: 50 },
                ]
            },
            {
                id: 'tech',
                title: 'Innovez avec l\'IA & la 3D',
                label: 'Technologies',
                description: 'Boostez l\'interactivité et l\'intelligence de votre plateforme avec nos briques innovantes.',
                options: [
                    { id: 'ia-custom', label: 'Création & Intégration IA', price: 400, icon: <Icon name="Cpu" size={24} />, info: 'Chatbots intelligents ou génération de contenu dynamique.', features: ['Productivité accrue', 'Support client 24/7', 'Vision futuriste'], impact: 25 },
                    { id: 'graphisme-3d', label: 'Expérience 3D Immersive', price: 300, icon: <Icon name="Box" size={24} />, info: 'Environnements 3D interactifs pour un impact visuel total.', features: ['Effet wahou garanti', 'Engagement +300%', 'Technologie WebGL'], impact: 15 },
                    { id: 'seo-setup', label: 'Optimisation SEO Expert', price: 300, recommended: true, icon: <Icon name="Search" size={24} />, info: 'Configuration technique complète pour dominer Google.', features: ['Sémantique avancée', 'Maillage interne', 'Audit technique'], impact: 10 },
                ],
                multiple: true
            },
            {
                id: 'recurring',
                title: 'Assurez votre sérénité',
                label: 'Suivi',
                description: 'Choisissez votre niveau d\'accompagnement pour garantir performance et sécurité.',
                options: [
                    { id: 'maint-essentielle', label: 'Maintenance Sérénité', price: 69, monthly: true, icon: <Icon name="ShieldCheck" size={24} />, info: 'Sauvegardes et monitoring de sécurité hebdomadaire.', features: ['Updates WP/Plugins', 'Backup Cloud journalier', 'Sécurité active'], impact: 5 },
                    { id: 'maint-premium', label: 'Maintenance Innovation', price: 149, monthly: true, recommended: true, icon: <Icon name="ShieldCheck" size={24} />, info: 'Support prioritaire et évolution technique de vos modules complexes.', features: ['Support Slack dédié', 'Temps d\'intervention <4h', 'Évolutions offertes'], impact: 10 },
                    { id: 'seo-local', label: 'Croissance SEO Mensuelle', price: 190, monthly: true, icon: <Icon name="Search" size={24} />, info: 'Suivi mensuel et stratégie de contenu pour dominer le marché.', features: ['Reporting mensuel', 'Rédaction blogs IA', 'Suivi positions'], impact: 15 },
                ],
                multiple: true
            },
            {
                id: 'brief',
                title: 'Décrivez votre vision',
                label: 'Projet',
                description: 'Dites-nous en plus sur vos objectifs pour affiner notre future collaboration.',
                isBriefStep: true
            }
        ];

        const AnimatedNumber = ({ value }) => {
            const [displayValue, setDisplayValue] = useState(value);
            useEffect(() => {
                let start = displayValue;
                const end = value;
                if (start === end) return;
                const duration = 800;
                const startTime = performance.now();
                const animate = (currentTime) => {
                    const elapsed = currentTime - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    const easeOutExpo = (t) => t === 1 ? 1 : 1 - Math.pow(2, -10 * t);
                    const currentCount = Math.floor(start + (end - start) * easeOutExpo(progress));
                    setDisplayValue(currentCount);
                    if (progress < 1) requestAnimationFrame(animate);
                };
                requestAnimationFrame(animate);
            }, [value]);
            return <span>{new Intl.NumberFormat('fr-FR').format(displayValue)}€</span>;
        };

        function App() {
            const [currentStep, setCurrentStep] = useState(0);
            const [selections, setSelections] = useState({});
            const [showSummary, setShowSummary] = useState(false);
            const [isSending, setIsSending] = useState(false);
            const [statusMessage, setStatusMessage] = useState(null);
            
            const [clientInfo, setClientInfo] = useState({ company: '', email: '', phone: '', brief: '' });

            const formatPrice = (price) => new Intl.NumberFormat('fr-FR').format(price);

            const selectedOptions = useMemo(() => {
                const allOptions = STEPS.flatMap(s => s.options || []);
                const flatSelections = Object.values(selections).flat();
                return allOptions.filter(o => flatSelections.includes(o.id));
            }, [selections]);

            const totals = useMemo(() => {
                return selectedOptions.reduce((acc, curr) => {
                    if (curr.monthly) acc.monthly += curr.price;
                    else acc.oneTime += curr.price;
                    return acc;
                }, { oneTime: 0, monthly: 0 });
            }, [selectedOptions]);

            const hasCustomPrice = useMemo(() => selectedOptions.some(o => o.customPrice), [selectedOptions]);

            const handleSelect = (optionId) => {
                const step = STEPS[currentStep];
                if (step.multiple) {
                    const currentSelections = selections[step.id] || [];
                    const newSelections = currentSelections.includes(optionId)
                        ? currentSelections.filter(id => id !== optionId)
                        : [...currentSelections, optionId];
                    setSelections({ ...selections, [step.id]: newSelections });
                } else {
                    setSelections({ ...selections, [step.id]: optionId });
                }
            };

            const canProgress = () => {
                const step = STEPS[currentStep];
                if (step.id === 'contact') {
                    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    return clientInfo.company.trim().length > 1 && emailRegex.test(clientInfo.email);
                }
                if (step.id === 'base') return !!selections['base'];
                return true;
            };

            const handleNext = () => {
                if (currentStep < STEPS.length - 1) {
                    setCurrentStep(currentStep + 1);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else {
                    setShowSummary(true);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            };

            const handlePrev = () => {
                if (currentStep > 0) {
                    setCurrentStep(currentStep - 1);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            };

            const navigateToStep = (index) => {
                if (index < currentStep) setCurrentStep(index);
                else if (index === currentStep + 1 && canProgress()) setCurrentStep(index);
            };

            const downloadQuote = () => {
                const date = new Date().toLocaleDateString('fr-FR');
                const quoteId = `JAAD-${Math.floor(1000 + Math.random() * 9000)}`;
                const element = document.createElement('div');
                element.style.padding = '50px';
                element.style.backgroundColor = '#ffffff';
                element.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: start; border-bottom: 4px solid ${JAAD_BLUE}; padding-bottom: 30px; margin-bottom: 40px;">
                        <h1 style="font-size: 42px; font-weight: 900; color: ${JAAD_BLUE}; margin: 0; letter-spacing: -2px;">JAAD.</h1>
                        <div style="text-align: right;"><h2 style="font-size: 18px; font-weight: 800; margin: 0;">Devis ${quoteId}</h2><p style="font-size: 12px; color: #64748b;">${date}</p></div>
                    </div>
                    <div style="margin-bottom: 40px;"><p style="font-size: 10px; color: #94a3b8; font-weight: 900; text-transform: uppercase;">Pour</p><p style="font-size: 18px; font-weight: 800; margin: 5px 0 0 0;">${clientInfo.company}</p><p style="font-size: 12px;">${clientInfo.email}</p></div>
                    <h3 style="font-size: 12px; font-weight: 800; text-transform: uppercase; color: ${JAAD_BLUE}; margin-bottom: 20px; border-left: 4px solid ${JAAD_BLUE}; padding-left: 15px;">Détail de la Configuration</h3>
                    <table style="width: 100%; border-collapse: collapse; margin-bottom: 40px;">
                        ${selectedOptions.map(o => `
                            <tr>
                                <td style="padding: 15px 0; border-bottom: 1px solid #f1f5f9; font-weight: 600;">${o.label}</td>
                                <td style="padding: 15px 0; border-bottom: 1px solid #f1f5f9; text-align: right; font-weight: 800; color: ${o.monthly ? '#0f172a' : JAAD_BLUE};">${o.customPrice || formatPrice(o.price) + (o.monthly ? '€/m' : '€')}</td>
                            </tr>
                        `).join('')}
                    </table>
                    <div style="background: #0f172a; color: white; padding: 40px; border-radius: 24px; display: flex; justify-content: space-between; align-items: center;">
                        <div><p style="font-size: 10px; opacity: 0.6; text-transform: uppercase; font-weight: 800;">Total Setup HT</p><p style="font-size: 36px; font-weight: 900; margin: 0;">${formatPrice(totals.oneTime)}€</p></div>
                        <div style="text-align: right;"><p style="font-size: 10px; opacity: 0.6; text-transform: uppercase; font-weight: 800;">Abonnement HT</p><p style="font-size: 24px; font-weight: 800; margin: 0;">${formatPrice(totals.monthly)}€/m</p></div>
                    </div>
                `;
                html2pdf().set({ margin: 0, filename: `Devis_JAAD_${clientInfo.company}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 3 }, jsPDF: { format: 'a4' }}).from(element).save();
            };

            const sendEmail = async () => {
                setIsSending(true);
                const templateParams = { to_email: "hello@jaad.studio", client_company: clientInfo.company, client_email: clientInfo.email, total_setup: formatPrice(totals.oneTime), total_monthly: formatPrice(totals.monthly), selected_options: selectedOptions.map(o => o.label).join(', ') };
                try {
                    const response = await fetch("https://api.emailjs.com/api/v1.0/email/send", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ service_id: EMAILJS_CONFIG.SERVICE_ID, template_id: EMAILJS_CONFIG.TEMPLATE_ID, user_id: EMAILJS_CONFIG.PUBLIC_KEY, template_params: templateParams }) });
                    if (response.ok) setStatusMessage({ type: 'success', text: "✓ Votre demande a été transmise avec succès." });
                    else setStatusMessage({ type: 'error', text: "Erreur lors de l'envoi." });
                } catch (e) { setStatusMessage({ type: 'error', text: "Erreur de connexion." }); }
                finally { setIsSending(false); }
            };

            return (
                <div className="min-h-screen text-[#1A1F36] selection:bg-blue-100 pb-40">
                    <header className="px-6 py-6 lg:py-8 flex justify-between items-center bg-white/80 backdrop-blur-md border-b border-slate-100 sticky top-0 z-50">
                        <span className="text-2xl lg:text-3xl font-black tracking-tighter uppercase flex items-baseline" style={{ color: JAAD_BLUE }}>
                            JAAD<span className="text-slate-900 ml-0.5">.</span>
                        </span>
                        <div className="text-right hidden sm:block">
                            <p className="text-[9px] uppercase font-black text-slate-400 tracking-[0.2em]">Estimation</p>
                            <div className="text-xl font-extrabold text-[#1A1F36]">
                                <AnimatedNumber value={totals.oneTime + totals.monthly} />
                            </div>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto p-4 lg:p-6 pt-12">
                        {!showSummary ? (
                            <div className="space-y-12 animate-in fade-in duration-700 pb-10">
                                <div className="flex justify-between items-center max-w-2xl mx-auto mb-16 overflow-x-auto lg:overflow-visible pb-4 px-2">
                                    {STEPS.map((s, idx) => (
                                        <React.Fragment key={s.id}>
                                            <div className={`flex flex-col items-center gap-2 min-w-max ${idx <= currentStep ? 'cursor-pointer' : 'opacity-30'}`} onClick={() => navigateToStep(idx)}>
                                                <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm transition-all duration-500 ${idx <= currentStep ? 'bg-blue-600 text-white shadow-lg shadow-blue-200' : 'bg-slate-100 text-slate-400'}`}>
                                                    {idx < currentStep ? <Icon name="Check" size={16} /> : `0${idx + 1}`}
                                                </div>
                                                <span className={`text-[9px] uppercase tracking-widest font-extrabold ${idx === currentStep ? 'text-blue-600' : 'text-slate-400'}`}>{s.label}</span>
                                            </div>
                                            {idx < STEPS.length - 1 && <div className={`h-[2px] w-8 lg:flex-1 rounded-full ${idx < currentStep ? 'bg-blue-600' : 'bg-slate-100'}`} />}
                                        </React.Fragment>
                                    ))}
                                </div>

                                <div className="text-center space-y-4">
                                    <h1 className="text-4xl md:text-7xl font-black tracking-tighter text-slate-900 uppercase leading-none">{STEPS[currentStep]?.title}</h1>
                                    <p className="text-slate-500 text-sm lg:text-lg max-w-xl mx-auto font-medium">{STEPS[currentStep]?.description}</p>
                                </div>

                                {STEPS[currentStep].isContactStep && (
                                    <div className="max-w-md mx-auto bg-white p-10 rounded-[2.5rem] card-shadow border border-white space-y-6">
                                        <div className="space-y-4">
                                            <div className="relative group">
                                                <Icon name="Building2" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-blue-500 transition-colors" size={18} />
                                                <input type="text" placeholder="ENTREPRISE *" value={clientInfo.company} onChange={(e) => setClientInfo({...clientInfo, company: e.target.value})} className="w-full bg-slate-50 rounded-2xl px-12 py-5 text-[11px] font-bold tracking-widest uppercase outline-none focus:bg-white focus:ring-4 ring-blue-50 transition-all border border-transparent focus:border-blue-100" />
                                            </div>
                                            <div className="relative group">
                                                <Icon name="Mail" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-blue-500 transition-colors" size={18} />
                                                <input type="email" placeholder="EMAIL DE CONTACT *" value={clientInfo.email} onChange={(e) => setClientInfo({...clientInfo, email: e.target.value})} className="w-full bg-slate-50 rounded-2xl px-12 py-5 text-[11px] font-bold tracking-widest uppercase outline-none focus:bg-white focus:ring-4 ring-blue-50 transition-all border border-transparent focus:border-blue-100" />
                                            </div>
                                        </div>
                                        {!canProgress() && <div className="flex items-center gap-2 justify-center text-[10px] font-bold text-blue-500 uppercase tracking-widest animate-pulse"><Icon name="AlertCircle" size={14} /> Identification requise pour voir les tarifs</div>}
                                    </div>
                                )}

                                {STEPS[currentStep].isBriefStep && (
                                    <div className="max-w-2xl mx-auto bg-white p-10 rounded-[2.5rem] card-shadow border border-white space-y-6">
                                        <textarea rows="6" placeholder="Décrivez vos besoins..." value={clientInfo.brief} onChange={(e) => setClientInfo({...clientInfo, brief: e.target.value})} className="w-full bg-slate-50 rounded-2xl p-6 text-sm font-medium outline-none focus:bg-white focus:ring-4 ring-blue-50 transition-all border border-transparent focus:border-blue-100 resize-none"></textarea>
                                    </div>
                                )}

                                {!STEPS[currentStep].isContactStep && !STEPS[currentStep].isBriefStep && (
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {STEPS[currentStep]?.options.map((option) => {
                                            const isSelected = Array.isArray(selections[STEPS[currentStep].id]) ? selections[STEPS[currentStep].id]?.includes(option.id) : selections[STEPS[currentStep].id] === option.id;
                                            return (
                                                <button key={option.id} onClick={() => !option.disabled && handleSelect(option.id)} disabled={option.disabled} 
                                                    className={`group relative p-8 text-left transition-all duration-500 rounded-[2.2rem] border-[1.5px] flex flex-col h-full hover:-translate-y-1 ${
                                                        option.disabled ? 'opacity-40 grayscale cursor-not-allowed border-transparent bg-slate-100' : 
                                                        isSelected ? 'bg-white border-blue-500 card-shadow-active scale-[1.02] selected-ring' : 
                                                        'bg-white border-slate-100 hover:border-blue-200 card-shadow'
                                                    }`}
                                                >
                                                    {option.recommended && (
                                                        <div className="absolute -top-3 left-8 bg-gradient-to-r from-blue-600 to-indigo-600 text-white text-[8px] uppercase tracking-widest font-black py-1.5 px-4 rounded-full shadow-lg shadow-blue-200 z-10">
                                                            Recommandé
                                                        </div>
                                                    )}

                                                    {isSelected && (
                                                        <div className="absolute top-6 right-6 w-6 h-6 bg-blue-600 rounded-full flex items-center justify-center animate-in zoom-in-95">
                                                            <Icon name="Check" size={12} className="text-white" />
                                                        </div>
                                                    )}

                                                    <div className="flex justify-between items-start mb-8">
                                                        <div className={`p-4 rounded-2xl transition-all duration-300 ${isSelected ? 'bg-blue-600 text-white' : 'bg-blue-50 text-blue-600 group-hover:bg-blue-100'}`}>{option.icon}</div>
                                                        <div className={`font-mono text-sm font-black ${isSelected ? 'text-blue-600' : 'text-slate-400'}`}>{option.customPrice || formatPrice(option.price) + '€'}</div>
                                                    </div>
                                                    <h3 className={`text-xl font-extrabold mb-3 uppercase tracking-tight leading-tight ${isSelected ? 'text-slate-900' : 'text-slate-700'}`}>{option.label}</h3>
                                                    <p className="text-[11px] text-slate-400 font-semibold mb-8 leading-relaxed">{option.info}</p>
                                                    
                                                    {option.features && (
                                                        <div className={`mt-auto pt-6 border-t ${isSelected ? 'border-blue-50' : 'border-slate-50'} space-y-3`}>
                                                            {option.features.map((f, i) => (
                                                                <div key={i} className="flex items-start gap-2.5">
                                                                    <div className={`w-4 h-4 rounded-full flex items-center justify-center mt-0.5 ${isSelected ? 'bg-blue-100' : 'bg-slate-100'}`}>
                                                                        <Icon name="Check" size={8} className={isSelected ? 'text-blue-600' : 'text-slate-400'} />
                                                                    </div>
                                                                    <span className={`text-[11px] font-bold ${isSelected ? 'text-slate-700' : 'text-slate-500'}`}>{f}</span>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    )}
                                                </button>
                                            );
                                        })}
                                    </div>
                                )}

                                <div className="flex items-center pt-8 border-t border-slate-50">
                                    <button onClick={handlePrev} disabled={currentStep === 0} className={`flex items-center gap-2 px-8 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all ${currentStep === 0 ? 'opacity-0' : 'text-slate-400 hover:text-slate-900 bg-white hover:card-shadow'}`}><Icon name="ChevronLeft" size={16} /> Précédent</button>
                                </div>
                            </div>
                        ) : (
                            <div className="max-w-4xl mx-auto space-y-16 animate-in zoom-in-95 pb-20">
                                <div className="text-center space-y-6">
                                    <div className="inline-block p-8 rounded-[2.5rem] bg-blue-50 text-blue-600 animate-pulse"><Icon name="FileText" size={48} /></div>
                                    <h2 className="text-5xl lg:text-7xl font-black uppercase tracking-tighter">Votre Devis Final.</h2>
                                    <p className="text-slate-400 font-bold uppercase tracking-widest text-xs">Document sur-mesure pour {clientInfo.company}</p>
                                </div>

                                {statusMessage && (
                                    <div className={`p-8 rounded-[2.5rem] text-center text-[10px] font-black uppercase tracking-widest flex flex-col items-center gap-4 border-2 ${statusMessage.type === 'success' ? 'bg-green-50 text-green-600 border-green-100' : 'bg-red-50 text-red-500 border-red-100'}`}>
                                        {statusMessage.type === 'success' ? <Icon name="Check" size={32} /> : <Icon name="XCircle" size={32} />}
                                        {statusMessage.text}
                                    </div>
                                )}

                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                                    <button onClick={downloadQuote} className="flex items-center justify-center gap-4 bg-white border-2 border-slate-100 p-8 rounded-[2.5rem] font-black text-xs uppercase tracking-widest hover:border-blue-600 hover:text-blue-600 transition-all card-shadow">
                                        <Icon name="Download" size={20} /> Télécharger le PDF
                                    </button>
                                    <button onClick={sendEmail} disabled={isSending} className="flex items-center justify-center gap-4 bg-blue-600 text-white p-8 rounded-[2.5rem] font-black text-xs uppercase tracking-widest hover:scale-[1.03] transition-all shadow-xl shadow-blue-200 disabled:opacity-50">
                                        {isSending ? <Icon name="Loader2" size={20} className="animate-spin" /> : <Icon name="Send" size={20} />}
                                        Envoyer par mail
                                    </button>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div className="bg-white p-12 rounded-[3.5rem] card-shadow border border-white">
                                        <h3 className="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-10 flex items-center gap-3"><Icon name="Rocket" size={16} /> Architecture Setup</h3>
                                        <div className="space-y-6 mb-12">
                                            {selectedOptions.filter(o => !o.monthly).map(o => (
                                                <div key={o.id} className="flex justify-between items-center"><span className="font-bold text-slate-800 text-sm uppercase tracking-tighter">{o.label}</span><div className="flex-1 mx-6 border-b border-slate-50"></div><span className="font-mono text-sm font-black text-blue-600">{o.customPrice || formatPrice(o.price) + '€'}</span></div>
                                            ))}
                                        </div>
                                        <div className="pt-10 border-t-4 border-slate-50 flex justify-between items-end"><span className="text-[10px] font-black text-slate-400 uppercase">Investissement Total Setup</span><span className="text-4xl font-black text-blue-600">{formatPrice(totals.oneTime)}€</span></div>
                                    </div>
                                    <div className="bg-slate-900 p-12 rounded-[3.5rem] text-white shadow-2xl">
                                        <h3 className="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-10 flex items-center gap-3"><Icon name="TrendingUp" size={16} /> Suivi Mensuel</h3>
                                        <div className="space-y-6 mb-12">
                                            {selectedOptions.filter(o => o.monthly).map(o => (
                                                <div key={o.id} className="flex justify-between items-center"><span className="font-bold text-blue-100 text-sm uppercase tracking-tighter">{o.label}</span><div className="flex-1 mx-6 border-b border-white/10"></div><span className="font-mono text-sm font-black text-blue-400">{o.customPrice || formatPrice(o.price) + '€'}</span></div>
                                            ))}
                                        </div>
                                        <div className="pt-10 border-t-4 border-white/10 flex justify-between items-end"><span className="text-[10px] font-black text-slate-500 uppercase">Mensuel HT</span><span className="text-4xl font-black text-white">{formatPrice(totals.monthly)}€</span></div>
                                    </div>
                                </div>
                                <div className="flex justify-center pt-10 pb-20">
                                    <button 
                                        onClick={() => { setShowSummary(false); setCurrentStep(0); setStatusMessage(null); }} 
                                        className="flex items-center gap-3 px-8 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-blue-600 hover:bg-blue-50 transition-all border border-slate-100 hover:border-blue-100"
                                    >
                                        <Icon name="RotateCcw" size={16} />
                                        Nouveau devis
                                    </button>
                                </div>
                            </div>
                        )}
                    </main>

                    {!showSummary && (
                        <div className="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl border-t border-slate-100 p-8 shadow-[0_-20px_50px_rgba(0,0,0,0.05)] z-40 flex justify-between items-center lg:px-24">
                            <div className="flex flex-col">
                                <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Total estimé</span>
                                <span className="text-4xl font-black text-blue-600 leading-none tracking-tighter">{formatPrice(totals.oneTime + totals.monthly)}€ {hasCustomPrice && <span className="text-xl">*</span>}</span>
                            </div>
                            <button onClick={handleNext} disabled={!canProgress()} className="bg-blue-600 text-white px-12 lg:px-20 py-5 rounded-2xl text-xs font-black uppercase tracking-widest shadow-xl shadow-blue-100 hover:scale-105 active:scale-95 transition-all disabled:opacity-20 flex items-center gap-4 group">
                                {currentStep === STEPS.length - 1 ? 'Finaliser mon devis' : 'Suivant'}
                                <Icon name="ChevronRight" size={18} className="group-hover:translate-x-1 transition-all" />
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
