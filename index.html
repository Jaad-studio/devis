        // --- COMPOSANT COMPTEUR ANIMÉ ---
        const AnimatedNumber = ({ value }) => {
            const [displayValue, setDisplayValue] = useState(value);
            useEffect(() => {
                let start = displayValue;
                const end = value;
                if (start === end) return;
                const duration = 600;
                const startTime = performance.now();
                const animate = (currentTime) => {
                    const elapsed = currentTime - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    const easeOutQuad = (t) => t * (2 - t);
                    const currentCount = Math.floor(start + (end - start) * easeOutQuad(progress));
                    setDisplayValue(currentCount);
                    if (progress < 1) requestAnimationFrame(animate);
                };
                requestAnimationFrame(animate);
            }, [value]);
            return <span>{displayValue}€</span>;
        };

                    else acc.oneTime += curr.price;
                    return acc;
                }, { oneTime: 0, monthly: 0 });
            }, [selectedOptions]);

                const score = selectedOptions.reduce((acc, curr) => acc + (curr.impact || 0), 0);
                return Math.min(score, 100);
            }, [selectedOptions]);

                if (step.multiple) {
                    const currentSelections = selections[step.id] || [];

                        ? currentSelections.filter(id => id !== optionId)
                        : [...currentSelections, optionId];
                    setSelections({ ...selections, [step.id]: newSelections });
                } else {
                    setSelections({ ...selections, [step.id]: optionId });
                }

                const step = STEPS[currentStep];
                if (step.id === 'contact') {
                    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

                return true;

                if (currentStep < STEPS.length - 1) {
                    setCurrentStep(currentStep + 1);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else {
                    setShowSummary(true);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            };

                    setCurrentStep(currentStep - 1);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            };

            const navigateToStep = (index) => {
                if (index < currentStep) {
                    setCurrentStep(index);
                } else if (index === currentStep + 1 && canProgress()) {
                    setCurrentStep(index);
                }
            };

            const sendEmail = async () => {

                        </h3>
                        <div className="space-y-4 max-h-[35vh] overflow-y-auto pr-2 custom-scrollbar">
                            {selectedOptions.length === 0 && <p className="text-[10px] text-slate-300 uppercase font-black italic">En attente de choix...</p>}
                            {selectedOptions.map(opt => (
                            <div key={opt.id} className="flex justify-between items-start animate-in slide-in-from-right-2 duration-300">
                                <span className="text-[9px] font-black uppercase leading-tight tracking-tighter max-w-[70%]">{opt.label}</span>
                                <span className="text-[10px] font-mono font-bold text-sky-600">{opt.customPrice || `${opt.price}€`}</span>
                            </div>
                            ))}
                        </div>
                        <div className="mt-8 pt-6 border-t-2 border-slate-50 space-y-2">
                            <div className="flex justify-between items-center text-slate-900">
                                <span className="text-[10px] font-black uppercase tracking-widest">Initial Setup</span>
                                <span className="font-mono font-black">{totals.oneTime}€</span>
                            </div>
                            <div className="flex justify-between items-center text-sky-500 pt-2 border-t border-slate-50">
                                <span className="text-[9px] font-black uppercase tracking-widest">Abonnement</span>
                                <span className="font-mono font-bold">{totals.monthly}€/m</span>
                            </div>
                        </div>
                        </div>
                    </aside>
                    )}

                    <div className="flex-1">
                    {!showSummary ? (
                        <div className="space-y-8 lg:space-y-12 animate-in fade-in duration-700 pb-10">
                        <div className="flex justify-between items-center max-w-2xl mx-auto mb-8 lg:mb-16 px-2 overflow-x-auto lg:overflow-visible pb-4">
                            {STEPS.map((s, idx) => (
                            <React.Fragment key={s.id}>
                                <div 
                                    className={`flex flex-col items-center gap-2 group cursor-pointer min-w-max transition-all ${idx > currentStep && !canProgress() ? 'cursor-not-allowed opacity-30' : ''}`} 
                                    onClick={() => navigateToStep(idx)}
                                >
                                <div 
                                    className={`w-8 h-8 lg:w-10 lg:h-10 rounded-full flex items-center justify-center font-black text-[10px] lg:text-xs transition-all duration-500 ${idx <= currentStep ? 'scale-110 shadow-lg' : 'opacity-30'}`}
                                    style={{ backgroundColor: idx <= currentStep ? JAAD_BLUE : "#E2E8F0", color: idx <= currentStep ? "white" : "#94A3B8" }}
                                >
                                    {idx < currentStep ? <Icon name="Check" size={14} /> : `0${idx + 1}`}
                                </div>
                                <span className={`text-[8px] lg:text-[9px] uppercase tracking-widest font-black transition-colors ${idx === currentStep ? 'text-slate-900' : 'text-slate-400'}`}>
                                    {s.label}
                                </span>
                                </div>
                                {idx < STEPS.length - 1 && (
                                <div className={`h-[2px] w-6 lg:flex-1 mx-1 lg:mx-2 rounded-full transition-all duration-1000 ${idx < currentStep ? 'bg-blue-500' : 'bg-slate-100'}`} />
                                )}
                            </React.Fragment>
                            ))}
                        </div>

                        <div className="text-center space-y-3 lg:space-y-4">
                            <h1 className="text-3xl md:text-7xl font-extrabold tracking-tighter text-slate-900 leading-tight lg:leading-none uppercase">
                            {STEPS[currentStep]?.title}
                            </h1>
                            <p className="text-slate-400 text-sm lg:text-lg max-w-xl mx-auto font-medium leading-relaxed">
                            {STEPS[currentStep]?.description}
                            </p>
                        </div>

                        {STEPS[currentStep].isContactStep && (
                            <div className="max-w-md mx-auto bg-white p-6 lg:p-10 rounded-[2.5rem] shadow-xl border border-blue-50 space-y-6">
                            <div className="space-y-4">
                                <div className="relative group">
                                <Icon name="Building2" className={`absolute left-4 top-1/2 -translate-y-1/2 transition-colors ${clientInfo.company ? 'text-blue-500' : 'text-slate-300'}`} size={18} />
                                <input 
                                    type="text" 
                                    placeholder="NOM DE VOTRE ENTREPRISE *" 
                                    value={clientInfo.company}
                                    onChange={(e) => setClientInfo({...clientInfo, company: e.target.value})}
                                    className="w-full bg-slate-50 border-2 border-transparent focus:border-blue-100 focus:bg-white rounded-2xl px-12 py-4 lg:py-5 text-[10px] font-black tracking-widest uppercase outline-none transition-all"
                                />
                                </div>
                                <div className="relative group">
                                <Icon name="Mail" className={`absolute left-4 top-1/2 -translate-y-1/2 transition-colors ${clientInfo.email.includes('@') ? 'text-blue-500' : 'text-slate-300'}`} size={18} />
                                <input 
                                    type="email" 
                                    placeholder="EMAIL DE CONTACT *" 
                                    value={clientInfo.email}
                                    onChange={(e) => setClientInfo({...clientInfo, email: e.target.value})}
                                    className="w-full bg-slate-50 border-2 border-transparent focus:border-blue-100 focus:bg-white rounded-2xl px-12 py-4 lg:py-5 text-[10px] font-black tracking-widest uppercase outline-none transition-all"
                                />
                                </div>
                                <div className="relative group">
                                <Icon name="Phone" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300" size={18} />
                                <input 
                                    type="tel" 
                                    placeholder="TÉLÉPHONE (OPTIONNEL)" 
                                    value={clientInfo.phone}
                                    onChange={(e) => setClientInfo({...clientInfo, phone: e.target.value})}
                                    className="w-full bg-slate-50 border-2 border-transparent focus:border-blue-100 focus:bg-white rounded-2xl px-12 py-4 lg:py-5 text-[10px] font-black tracking-widest uppercase outline-none transition-all"
                                />
                                </div>
                            </div>
                            {!canProgress() && (
                                <div className="flex items-center gap-2 justify-center text-[10px] font-bold text-blue-400 uppercase tracking-widest animate-pulse">
                                <Icon name="AlertCircle" size={14} /> Champs obligatoires pour le devis
                                </div>
                            )}
                            </div>
                        )}

                        {STEPS[currentStep].isBriefStep && (
                            <div className="max-w-2xl mx-auto bg-white p-6 lg:p-10 rounded-[2.5rem] shadow-xl border border-blue-50 space-y-6">
                            <div className="flex items-center gap-3 mb-2 lg:mb-4">
                                <Icon name="Lightbulb" size={24} className="text-blue-500" />
                                <h3 className="font-black uppercase tracking-widest text-[10px] lg:text-xs text-slate-500">Détaillez vos besoins</h3>
                            </div>
                            <textarea 
                                rows="6"
                                placeholder="Quels sont vos objectifs ?"
                                value={clientInfo.brief}
                                onChange={(e) => setClientInfo({...clientInfo, brief: e.target.value})}
                                className="w-full bg-slate-50 border-2 border-transparent focus:border-blue-100 focus:bg-white rounded-2xl p-6 text-sm font-medium outline-none transition-all resize-none shadow-inner"
                            ></textarea>
                            </div>
                        )}

                        {!STEPS[currentStep].isContactStep && !STEPS[currentStep].isBriefStep && (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 lg:gap-6">
                            {STEPS[currentStep]?.options.map((option) => {
                                const isSelected = Array.isArray(selections[STEPS[currentStep].id]) 
                                ? selections[STEPS[currentStep].id]?.includes(option.id)
                                : selections[STEPS[currentStep].id] === option.id;
                                return (
                                <button
                                    key={option.id}
                                    onClick={() => !option.disabled && handleSelect(option.id)}
                                    disabled={option.disabled}
                                    className={`group relative p-6 lg:p-8 text-left transition-all duration-300 rounded-[2rem] border-2 flex flex-col justify-between h-full ${
                                    option.disabled 
                                        ? 'bg-slate-50 border-transparent opacity-60 cursor-not-allowed' 
                                        : isSelected 
                                        ? 'bg-white shadow-2xl scale-[1.02] border-blue-500' 
                                        : 'bg-white border-white hover:border-blue-100 hover:shadow-xl shadow-sm'
                                    }`}
                                >
                                    <div>
                                    <div className="flex justify-between items-start mb-4 lg:mb-6">
                                        <div className="p-3 lg:p-4 rounded-2xl transition-all duration-300" style={{ backgroundColor: option.disabled ? '#E2E8F0' : (isSelected ? JAAD_BLUE : `${JAAD_BLUE}08`), color: option.disabled ? '#94A3B8' : (isSelected ? "white" : JAAD_BLUE) }}>
                                        {option.icon}
                                        </div>
                                        <div className="text-right">
                                            <span className="font-mono text-xs lg:text-sm font-black" style={{ color: option.disabled ? '#94A3B8' : (isSelected ? JAAD_BLUE : "#94A3B8") }}>
                                            {option.customPrice || `${option.price}€${option.monthly ? '/m' : ''}`}
                                            </span>
                                        </div>
                                    </div>
                                    <h3 className={`text-lg lg:text-xl font-bold mb-2 lg:mb-3 tracking-tight uppercase leading-none ${option.disabled ? 'text-slate-400' : 'text-slate-900'}`}>{option.label}</h3>
                                    <p className="text-[11px] lg:text-xs leading-relaxed text-slate-400 font-medium">{option.info}</p>
                                    </div>
                                </button>
                                );
                            })}
                            </div>
                        )}

                        <div className="flex items-center pt-8 border-t border-slate-100">
                            <button
                            onClick={handlePrev}
                            disabled={currentStep === 0}
                            className={`flex items-center gap-2 px-6 lg:px-8 py-3 rounded-2xl text-[9px] lg:text-[10px] font-black uppercase tracking-widest transition-all ${currentStep === 0 ? 'opacity-0' : 'text-slate-400 hover:text-slate-900 hover:bg-white shadow-sm'}`}
                            >
                            <Icon name="ChevronLeft" size={16} /> Précédent
                            </button>
                        </div>
                        </div>
                    ) : (
                        <div className="max-w-4xl mx-auto space-y-12 lg:space-y-16 animate-in zoom-in-95 duration-700 pb-20">
                        <div className="text-center space-y-4 lg:space-y-6">
                            <div className="inline-block p-4 rounded-[2rem] bg-blue-50 text-blue-600 mb-2 animate-pulse">
                            <Icon name="FileText" size={40} />
                            </div>
                            <h2 className="text-4xl lg:text-7xl font-black tracking-tighter text-slate-900 uppercase leading-none">Votre Devis Final<span style={{ color: JAAD_BLUE }}>.</span></h2>
                            <p className="text-slate-400 font-bold uppercase tracking-[0.3em] text-[10px] lg:text-xs italic">Configuration personnalisée pour {clientInfo.company}</p>
                        </div>

                        {statusMessage && (
                            <div className={`p-6 rounded-3xl text-center text-xs font-black uppercase tracking-widest animate-in fade-in slide-in-from-top-4 flex flex-col items-center gap-3 border-2 ${statusMessage.type === 'success' ? 'bg-green-50 text-green-600 border-green-100' : 'bg-red-50 text-red-500 border-red-100'}`}>
                                {statusMessage.type === 'success' ? <Icon name="Check" size={24} /> : <Icon name="XCircle" size={24} />}
                                {statusMessage.text}
                            </div>
                        )}

                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <button 
                            onClick={downloadQuote}
                            disabled={isSending}
                            className="flex items-center justify-center gap-3 bg-white border-2 border-slate-100 p-5 rounded-[2rem] font-black text-[9px] lg:text-[10px] uppercase tracking-widest hover:border-blue-500 transition-all shadow-sm group disabled:opacity-50"
                            >
                            <Icon name="Download" size={18} className="group-hover:translate-y-1 transition-transform" />
                            Télécharger mon devis PDF
                            </button>
                            <button 
                            onClick={sendEmail}
                            disabled={isSending}
                            className="flex items-center justify-center gap-3 text-white p-5 rounded-[2rem] font-black text-[9px] lg:text-[10px] uppercase tracking-widest hover:scale-105 transition-all shadow-xl group disabled:opacity-50"
                            style={{ backgroundColor: JAAD_BLUE }}
                            >
                            {isSending ? <Icon name="Loader2" size={18} className="animate-spin" /> : <Icon name="Send" size={18} className="group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform" />}
                            M'envoyer par email
                            </button>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div className="bg-white p-8 lg:p-10 rounded-[2.5rem] shadow-2xl shadow-blue-900/5 border border-blue-50">
                            <h3 className="text-[9px] font-black uppercase tracking-[0.3em] text-slate-400 mb-6 flex items-center gap-2">
                                <Icon name="Rocket" size={14} /> Setup Architecture
                            </h3>
                            <div className="space-y-4 mb-10">
                                {selectedOptions.filter(o => !o.monthly).map(o => (
                                <div key={o.id} className="flex justify-between items-center group">
                                    <span className="font-bold text-slate-800 text-[13px] uppercase tracking-tighter">{o.label}</span>
                                    <div className="flex-1 mx-4 border-b border-slate-50"></div>
                                    <span className="font-mono text-sm font-black" style={{ color: JAAD_BLUE }}>{o.customPrice || `${o.price}€`}</span>
                                </div>
                                ))}
                            </div>
                            <div className="pt-6 border-t-4 border-slate-50 flex justify-between items-end">
                                <span className="text-[10px] font-black text-slate-400 uppercase tracking-tighter">TOTAL SETUP HT</span>
                                <span className="text-3xl lg:text-4xl font-black" style={{ color: JAAD_BLUE }}>{totals.oneTime}€</span>
                            </div>
                            </div>

                            <div className="bg-slate-900 p-8 lg:p-10 rounded-[2.5rem] shadow-2xl shadow-slate-900/20 text-white">
                            <h3 className="text-[9px] font-black uppercase tracking-[0.3em] text-slate-500 mb-6 flex items-center gap-2">
                                <Icon name="TrendingUp" size={14} /> Maintenance Expert
                            </h3>
                            <div className="space-y-4 mb-10">
                                {selectedOptions.filter(o => o.monthly).map(o => (
                                <div key={o.id} className="flex justify-between items-center group">
                                    <span className="font-bold text-blue-50 text-[13px] uppercase tracking-tighter">{o.label}</span>
                                    <div className="flex-1 mx-4 border-b border-white/5"></div>
                                    <span className="font-mono text-sm font-black text-blue-400">{o.customPrice || `${o.price}€`}</span>
                                </div>
                                ))}
                            </div>
                            <div className="pt-6 border-t-4 border-white/5 flex justify-between items-end">
                                <span className="text-[10px] font-black text-slate-500 uppercase tracking-tighter">MENSUEL HT</span>
                                <span className="text-3xl lg:text-4xl font-black text-white">{totals.monthly}€</span>
                            </div>
                            </div>
                        </div>

                        <div className="text-center pt-4 lg:pt-8 pb-10">
                            <button onClick={() => { setShowSummary(false); setCurrentStep(0); setStatusMessage(null); }} className="text-[9px] font-black uppercase tracking-[0.4em] text-slate-300 hover:text-blue-600 transition-all">
                            [ Recommencer la configuration ]
                            </button>
                        </div>
                        </div>
                    )}
                    </div>
                </main>

                {!showSummary && (
                    <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-blue-50 p-5 shadow-[0_-15px_40px_rgba(0,0,0,0.1)] z-40 flex justify-between items-end lg:px-10">
                        <div className="flex flex-col">
                            <span className="text-[8px] lg:text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 italic">VOTRE CONFIGURATION</span>
                            <span className="text-2xl lg:text-3xl font-black" style={{ color: JAAD_BLUE }}>{totals.oneTime + totals.monthly}€</span>
                            <div className="flex items-center gap-2 mt-2">
                                <Icon name="TrendingUp" size={12} className="text-sky-400" />
                                <span className="text-[7px] lg:text-[8px] font-bold text-slate-300 uppercase tracking-tighter">Calcul instantané JAAD.Studio</span>
                            </div>
                        </div>
                        <div className="flex flex-col items-end gap-3">
                            <button 
                            onClick={handleNext} 
                            disabled={!canProgress()} 
                            className="text-white px-10 lg:px-16 py-4 lg:py-5 rounded-2xl text-[10px] lg:text-xs font-black uppercase tracking-[0.2em] shadow-lg transition-all active:scale-95 disabled:opacity-20 flex items-center gap-3 group"
                            style={{ backgroundColor: JAAD_BLUE, boxShadow: `0 15px 30px -10px ${JAAD_BLUE}60` }}
                            >
                                {currentStep === STEPS.length - 1 ? 'Générer mon devis' : 'Étape suivante'}
                                <Icon name="ChevronRight" size={16} className="group-hover:translate-x-1 transition-transform" />
                            </button>
                        </div>
                    </div>
                )}

                <footer className="py-12 lg:py-20 text-center text-slate-300 border-t border-slate-50 mt-10">
                    <span className="text-xl lg:text-2xl font-black uppercase tracking-[0.5em]" style={{ color: JAAD_BLUE }}>JAAD<span className="text-slate-900">.</span></span>
                    <div className="text-[8px] lg:text-[9px] font-bold text-slate-300 uppercase tracking-widest mt-4 italic">SIRET: 10151107900010 • hello@jaad.studio</div>
                </footer>
                </div>
            );
        }

        // --- INITIALISATION DE REACT ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
